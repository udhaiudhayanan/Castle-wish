<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Message for My Queen</title>

<style>
/* ---------- GLOBAL ---------- */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  height: 100vh;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ---------- SCENE ---------- */
.scene {
  position: relative;
  width: 100%;
  height: 100%;
  background:
    linear-gradient(#87ceeb 0%, #cfefff 55%, #4fa3c7 55%, #1e5f74 100%);
}

/* ---------- OCEAN WAVES ---------- */
.ocean {
  position: absolute;
  bottom: 0;
  width: 200%;
  height: 20%;
  background: repeating-linear-gradient(
    -45deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0.15) 10px,
    rgba(255,255,255,0.05) 10px,
    rgba(255,255,255,0.05) 20px
  );
  animation: wave 10s linear infinite;
}
@keyframes wave {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* ---------- CASTLE ---------- */
.castle {
  position: absolute;
  bottom: 20%;
  left: 10%;
  width: 200px;
  height: 220px;
  background: #d9d1c7;
  border-radius: 8px 8px 0 0;
}
.castle::before {
  content: "";
  position: absolute;
  top: -40px;
  left: 60px;
  width: 80px;
  height: 40px;
  background: #c2b8ad;
}

/* ---------- QUEEN ---------- */
.queen {
  position: absolute;
  bottom: 32%;
  left: 170px;
  font-size: 42px;
}

/* ---------- DOVE ---------- */
.dove {
  position: absolute;
  top: 20%;
  left: -60px;
  font-size: 36px;
  animation: fly 8s ease-in-out forwards;
}
@keyframes fly {
  0%   { transform: translateX(-60px) translateY(0); }
  60%  { transform: translateX(70vw) translateY(-40px); }
  100% { transform: translateX(55vw) translateY(0); }
}

/* ---------- SCROLL ---------- */
.scroll {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translateX(-50%);
  width: 260px;
  height: 0;
  background: #f5ecd8;
  border-radius: 8px;
  overflow: hidden;
  transition: height 1.5s ease;
}
.scroll.open {
  height: 280px;
}

/* ---------- THREAD ---------- */
.thread {
  position: absolute;
  top: 35%;
  left: 50%;
  transform: translateX(-50%);
  cursor: pointer;
  font-size: 20px;
}

/* ---------- LETTER ---------- */
.letter {
  opacity: 0;
  padding: 20px;
  text-align: center;
  transition: opacity 1.5s ease 0.5s;
}
.scroll.open .letter {
  opacity: 1;
}
h2 { margin-bottom: 10px; }

/* ---------- PROMPT ---------- */
.prompt {
  position: absolute;
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  color: #333;
}
</style>
</head>

<body>

<div class="scene">

  <div class="ocean"></div>

  <div class="castle"></div>
  <div class="queen">👑</div>

  <div class="dove">🕊️</div>

  <div class="prompt">Pull the thread</div>
  <div class="thread" id="thread">🧵</div>

  <div class="scroll" id="scroll">
    <div class="letter">
      <h2>My Queen ❤️</h2>
      <p>
        Across oceans and time,<br>
        this message flies only to you.<br><br>
        Every sunrise reminds me<br>
        that somewhere, you’re waiting.<br><br>
        Always yours.
      </p>
    </div>
  </div>

</div>

<script>
/* ---------- BIRDS SOUND (NO FILE) ---------- */
const ctx = new (window.AudioContext || window.webkitAudioContext)();
function birds() {
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  gain.gain.value = 0.03;
  osc.connect(gain).connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.2);
}
setInterval(birds, 4000);

/* ---------- INTERACTION ---------- */
const thread = document.getElementById("thread");
const scroll = document.getElementById("scroll");

thread.addEventListener("click", () => {
  scroll.classList.add("open");
  document.querySelector(".prompt").style.display = "none";
});
</script>

</body>
</html>
